<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="brain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e7ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c7d2fe;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Brain side view -->
  <g transform="translate(20, 14) scale(0.72)" filter="url(#glow)">
    <path d="M42 68 C42 68, 22 66, 17 53 C12 40, 18 33, 23 30 C17 26, 17 16, 28 12 C32 10, 38 10, 43 13 C45 7, 52 4, 60 6 C66 8, 70 14, 70 20 C74 18, 80 20, 82 26 C84 32, 80 38, 76 40 C80 44, 80 52, 74 56 C68 60, 62 60, 58 58 C56 64, 50 68, 42 68Z" fill="url(#brain)" stroke="none"/>
    <!-- Sulci/folds -->
    <path d="M32 34 C36 30, 40 32, 42 36" fill="none" stroke="#6366f1" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
    <path d="M42 36 C44 30, 50 28, 56 32" fill="none" stroke="#6366f1" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
    <path d="M56 32 C60 28, 66 30, 68 36" fill="none" stroke="#6366f1" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
    <path d="M27 46 C31 42, 37 44, 42 48" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <path d="M42 48 C46 44, 52 42, 58 46" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <path d="M34 56 C38 52, 44 54, 50 58" fill="none" stroke="#6366f1" stroke-width="1.3" stroke-linecap="round" opacity="0.35"/>
    <!-- Neural nodes -->
    <circle cx="37" cy="24" r="2" fill="#818cf8" opacity="0.7"/>
    <circle cx="54" cy="22" r="2" fill="#818cf8" opacity="0.7"/>
    <circle cx="65" cy="30" r="2" fill="#818cf8" opacity="0.7"/>
    <circle cx="45" cy="42" r="2" fill="#818cf8" opacity="0.6"/>
    <circle cx="35" cy="50" r="1.8" fill="#818cf8" opacity="0.5"/>
    <circle cx="55" cy="50" r="1.8" fill="#818cf8" opacity="0.5"/>
    <!-- Neural connections -->
    <line x1="37" y1="24" x2="54" y2="22" stroke="#a5b4fc" stroke-width="0.5" opacity="0.4"/>
    <line x1="54" y1="22" x2="65" y2="30" stroke="#a5b4fc" stroke-width="0.5" opacity="0.4"/>
    <line x1="37" y1="24" x2="45" y2="42" stroke="#a5b4fc" stroke-width="0.5" opacity="0.3"/>
    <line x1="54" y1="22" x2="45" y2="42" stroke="#a5b4fc" stroke-width="0.5" opacity="0.3"/>
    <line x1="45" y1="42" x2="35" y2="50" stroke="#a5b4fc" stroke-width="0.5" opacity="0.25"/>
    <line x1="45" y1="42" x2="55" y2="50" stroke="#a5b4fc" stroke-width="0.5" opacity="0.25"/>
  </g>
  <!-- Scan line -->
  <line x1="22" y1="78" x2="78" y2="78" stroke="#e0e7ff" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.3"/>
